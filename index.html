<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheButton | Game</title>
    <link rel="stylesheet" href="src/css/style.css">
    <script src="src/js/clickFunction.js" defer></script>
</head>
<body>
    
    <div class="ButtonGameCointainer">
        <img src="assets/buttons/ButtonCommon1.png" alt="The Button" class="ButtonImage">
    </div>
    <div class="TopBar">
      <div class="CurrencyPanel">
        <div class="Clicks">
          <span id="ClickCount">0</span>
          <span><img src="assets/ui/ButtonCurrency.png" alt="Click Icon" class="ClickIcon"></span>
        </div>

        <div class="Gems">
          <span id="GemCount">0</span>
          <span><img src="assets/ui/GemCurrency.png" alt="Gem Icon" class="GemIcon"></span>
        </div>
      </div>
    </div>

    <div class="SideBar">
        <button class="UpgradeButton"><img class="UpgradeLogo"src="assets/ui/UpgradeLogo.png" alt="Upgrade Icon"></button>
         <button class="ShopButton"><img class="UpgradeLogo"src="assets/ui/ShoppingCart.png" alt="Shopping Cart Icon"></button>

    </div>

    <div class="UpgradeFrame">
        <h2>Upgrades</h2>
        <div class="UpgradeList">
            <div class="UpgradeItem">
                <span class="UpgradeName">Auto Clicker</span>
                <span class="UpgradeCost">Cost: 100 Clicks</span>
                <button class="BuyUpgrade">Buy</button>
            </div>
    </div>
</body>
</html>
